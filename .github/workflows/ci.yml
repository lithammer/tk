name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test --summary all

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # install.sh must stay POSIX (runs under /bin/sh on macOS, Alpine,
      # etc.) so it is checked with `-s sh`. smoke.sh is bash and uses the
      # default dialect detected from its shebang.
      - run: shellcheck -s sh scripts/install.sh
      - run: shellcheck scripts/smoke.sh
