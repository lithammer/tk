name: Rust CI

# Slice-0 of the Rust rewrite lives on `rust-main`; per ADR-0018 the lint
# allow-list in `Cargo.toml` is ratified before clippy hard-fails on warnings.
# tk-83 is that flip. Lint severity (`deny`) lives in `[workspace.lints.*]` in
# Cargo.toml, so plain `cargo clippy` and `cargo build` already error on
# warnings — both locally and here. The existing `CI` workflow continues to
# guard the Zig codebase on `main`; this workflow is the Rust gate on
# `rust-main`.
on:
  push:
    branches: [rust-main]
  pull_request:
    branches: [rust-main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel + components (rustfmt, clippy)
      # for both contributors and CI, so no explicit toolchain action is
      # needed — the first `cargo` invocation installs via rustup.
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets
      - run: cargo test
