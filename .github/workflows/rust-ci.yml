name: Rust CI

# CI gate for the Rust tk crate. Lint severity (`deny`) lives in
# `[workspace.lints.*]` in Cargo.toml, so plain `cargo clippy` and `cargo test`
# already error on warnings — both locally and here.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel + components (rustfmt, clippy)
      # for both contributors and CI, so no explicit toolchain action is
      # needed — the first `cargo` invocation installs via rustup.
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets
      - run: cargo test

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # install.sh must stay POSIX (runs under /bin/sh on macOS, Alpine,
      # etc.) so it is checked with `-s sh`. smoke.sh is bash and uses the
      # default dialect detected from its shebang.
      - run: shellcheck -s sh scripts/install.sh
      - run: shellcheck scripts/smoke.sh
