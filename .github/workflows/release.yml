name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string to embed (e.g., v0.0.2-rc1)'
        required: true
        default: dev

# Per ADR 0011, release builds cross-compile all six target triples on a single
# Linux host and the smoke matrix verifies the artifacts on native runners.
# Releases are authored by a human (or an agent skill) as drafts with a
# hand-crafted changelog; this workflow attaches smoke-passing binaries to
# whichever Release fired the `release: created` event. Per ADR 0013, the
# install script and `tk self-update` resolve assets via the flat name
# pattern tk-<triple>[.exe].

# Serialize publishes for the same tag so a force-update or rapid retry does
# not race two `gh release upload` jobs against the same Release object.
# cancel-in-progress is false so the in-flight publish finishes before the
# second starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only GITHUB_TOKEN at the workflow level. The `publish` job
# re-grants `contents: write` on its own scope so only the asset-upload step
# has the elevated privilege.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Cross-compile six triples
        run: zig build release -Drelease-version=${{ inputs.version || github.ref_name }} --summary all
      - uses: actions/upload-artifact@v4
        with:
          name: tk-release-binaries
          path: zig-out/release/
          if-no-files-found: error
          retention-days: 14

  smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-linux-musl
            runner: ubuntu-latest
            bin: tk
          - triple: x86_64-linux-gnu
            runner: ubuntu-latest
            bin: tk
          - triple: aarch64-linux-musl
            runner: ubuntu-24.04-arm
            bin: tk
          - triple: aarch64-macos
            runner: macos-14
            bin: tk
          - triple: x86_64-windows-gnu
            runner: windows-latest
            bin: tk.exe
          - triple: aarch64-windows-gnu
            runner: windows-11-arm
            bin: tk.exe
            experimental: true
    runs-on: ${{ matrix.runner }}
    # windows-11-arm is in GitHub Actions preview; allow that one smoke job to
    # fail (or the runner to be unavailable) without blocking the workflow.
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tk-release-binaries
          path: zig-out/release
      - name: Smoke ${{ matrix.triple }}
        shell: bash
        run: ./scripts/smoke.sh ./zig-out/release/${{ matrix.triple }}/${{ matrix.bin }}
      # Publish gates per-triple asset upload on smoke success. Each smoke job
      # writes a marker file and uploads it as a per-triple artifact; the
      # publish job downloads all markers and renames only the triples that
      # produced one. `if: success()` makes the gate explicit so a future
      # `if: always()` step added between smoke and marker cannot accidentally
      # publish a binary that failed smoke. Works uniformly for the required
      # triples and the experimental aarch64-windows-gnu one (per ADR 0011,
      # that triple is best-effort and may be omitted from a given release).
      - name: Record smoke pass for ${{ matrix.triple }}
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-markers
          : > smoke-markers/${{ matrix.triple }}
      - if: success()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-pass-${{ matrix.triple }}
          path: smoke-markers/${{ matrix.triple }}
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: smoke
    # Only attach assets when triggered by a Release event. workflow_dispatch
    # still exercises build and smoke for manual verification but does not
    # touch an existing Release.
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tk-release-binaries
          path: zig-out/release
      # Collect every smoke-pass-<triple> marker. merge-multiple flattens all
      # matching artifacts into one directory so the rename loop can iterate
      # over the marker filenames to learn which triples passed smoke. A
      # missing marker means that triple's smoke failed (or, for the
      # experimental aarch64-windows-gnu runner, was unavailable) and its
      # binary is excluded from this release.
      - uses: actions/download-artifact@v4
        with:
          pattern: smoke-pass-*
          path: smoke-markers
          merge-multiple: true
      - name: Flatten binaries for smoke-passing triples
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat
          shopt -s nullglob
          for marker in smoke-markers/*; do
            triple="$(basename "$marker")"
            case "$triple" in
              *windows*) bin="tk.exe"; asset="tk-${triple}.exe" ;;
              *) bin="tk"; asset="tk-${triple}" ;;
            esac
            mv "zig-out/release/$triple/$bin" "release-flat/$asset"
            echo "publish: staged $asset"
          done
          # needs:smoke short-circuits the publish job when any required
          # triple fails, so this guard exists for the residual case where a
          # future refactor (relaxing a smoke step to continue-on-error, or
          # dropping the needs: dependency) lets publish run with no markers.
          # Without it, `gh release upload` on an empty file list would
          # succeed silently and the Release would stay asset-less.
          if [ -z "$(ls -A release-flat)" ]; then
            echo "publish: no smoke-passing binaries; refusing to attach to release" >&2
            exit 1
          fi
      - name: Attach release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" release-flat/tk-* --clobber
