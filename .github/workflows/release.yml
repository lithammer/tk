name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Per ADR-0011, release builds cross-compile every supported triple on a single
# Linux host (cargo-zigbuild keeps Zig as the C cross-compiler/linker for the
# bundled SQLite) and the smoke matrix verifies the artifacts on native runners.
# ADR-0012 fixes the per-triple linkage. The five-triple matrix is the supported
# install surface; ARM64 Windows is deferred (ADR-0011 Consequences).
#
# Per ADR-0029 the annotated tag is the whole release spec: the tag name drives
# the injected TK_VERSION (so `tk --version` reports the tag, no Cargo.toml
# bump) and the tag message carries the plain-text changelog the `draft` job
# renders to markdown. Pushing a `v*` tag fires this workflow, which builds and
# smokes every triple and then assembles a *draft* Release — binaries plus the
# install scripts plus the rendered notes — for a human to review and publish.
# Publishing is what locks immutability; this workflow never publishes.
# Per ADR-0013 the install script and `tk self-update` resolve assets via the
# flat name pattern tk-<triple>[.exe], where <triple> is the Rust target triple
# the binary reports in `tk --version`. workflow_dispatch exercises build and
# smoke for manual verification but skips the draft assembly.

# Serialize runs for the same tag so a rapid retry does not race two `draft`
# jobs against the same Release object. cancel-in-progress is false so an
# in-flight draft assembly finishes before the next starts.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Default to read-only GITHUB_TOKEN at the workflow level. The `draft` job
# re-grants `contents: write` on its own scope so only the Release-assembly step
# has the elevated privilege.
permissions:
  contents: read

env:
  # Reproducibility levers recorded alongside rust-toolchain.toml (ADR-0011):
  # the Zig CC version and the glibc floor are pinned so the same source
  # revision produces the same artifacts. cargo-zigbuild is pinned too.
  ZIG_VERSION: "0.16.0"
  CARGO_ZIGBUILD_VERSION: "0.20.1"
  # macOS SDK for cross-linking aarch64-apple-darwin from Linux. A 14.x SDK
  # targets back to MACOSX_DEPLOYMENT_TARGET=11.0 (ADR-0012); the checksum turns
  # a wrong or tampered download into a loud failure instead of a bad artifact.
  MACOS_SDK_VERSION: "14.5"
  MACOS_SDK_SHA256: "6e146275d19f027faa2e8354da5e0267513abf013b8f16ad65a231653a2b1c5d"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # fetch-tags pulls the annotated tag *object* (not just the commit) so the
      # changelog in its message is available to the notes step below.
      - uses: actions/checkout@v7
        with:
          fetch-tags: true

      # Per ADR-0029 the tag is the release spec. On a tag push the version
      # rides the tag name — injected as TK_VERSION so `tk --version` reports it
      # without a Cargo.toml bump — and the tag *message* carries the plain-text
      # changelog. workflow_dispatch has no tag: TK_VERSION stays unset and the
      # build falls back to the Cargo.toml placeholder for a throwaway dry run.
      - name: Resolve release version and notes from the tag
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Exported via GITHUB_ENV so build.rs sees TK_VERSION in every later
          # cargo invocation in this job.
          echo "TK_VERSION=${tag#v}" >> "${GITHUB_ENV}"
          mkdir -p dist
          # %(contents:body) is the tag message minus its subject line and any
          # signature: exactly the NEW/IMPROVED/FIXED block tk-changelog emits.
          # Promote the three known section labels (a closed vocabulary) to
          # markdown headings; bullets are already valid markdown and pass
          # through. ADR-0029 fixes the tag-text -> release-body contract.
          git for-each-ref --format='%(contents:body)' "refs/tags/${tag}" \
            | awk '
                $0 == "NEW"      { print "#### New";      next }
                $0 == "IMPROVED" { print "#### Improved"; next }
                $0 == "FIXED"    { print "#### Fixed";    next }
                                 { print }
              ' > dist/release-notes.md

      - name: Install Rust release targets
        run: rustup target add
          x86_64-unknown-linux-musl
          x86_64-unknown-linux-gnu
          aarch64-unknown-linux-musl
          aarch64-apple-darwin
          x86_64-pc-windows-gnu

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --version "${CARGO_ZIGBUILD_VERSION}" --locked

      # The x86_64-pc-windows-gnu build needs x86_64-w64-mingw32-dlltool: the
      # windows-sys / getrandom build scripts call it to generate import
      # libraries, and Zig does not ship a dlltool. binutils-mingw-w64-x86-64 is
      # the minimal package that provides it.
      - name: Install mingw-w64 binutils for the Windows import libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-mingw-w64-x86-64

      # The Apple SDK is the one cross-input not carried in the repo. Cache the
      # extracted tree so a release run normally pays only the build cost.
      - name: Cache macOS SDK
        id: macos-sdk
        uses: actions/cache@v6
        with:
          path: macos-sdk
          key: macos-sdk-${{ env.MACOS_SDK_VERSION }}

      - name: Fetch macOS SDK
        if: steps.macos-sdk.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p macos-sdk
          url="https://github.com/joseluisq/macosx-sdks/releases/download/${MACOS_SDK_VERSION}/MacOSX${MACOS_SDK_VERSION}.sdk.tar.xz"
          curl -fsSL -o sdk.tar.xz "${url}"
          echo "${MACOS_SDK_SHA256}  sdk.tar.xz" | sha256sum -c -
          tar -xJf sdk.tar.xz -C macos-sdk
          rm -f sdk.tar.xz

      # One ubuntu host builds every triple. TK_TRIPLE is set explicitly per
      # target so the embedded `tk --version` triple, the target/<triple>/
      # output directory, and the tk-<triple> asset name all agree — the glibc
      # floor rides the cargo-zigbuild `.2.28` suffix, which cargo strips before
      # it reaches the rustc target directory (so the dir is the bare triple).
      - name: Cross-compile release triples
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          set -euo pipefail
          mkdir -p dist
          # Resolve the extracted SDK directory by glob rather than hardcoding
          # the MacOSX<ver>.sdk name; a missing SDK fails the darwin link loudly.
          sdk_dir="$(ls -d macos-sdk/*.sdk)"
          export SDKROOT="${PWD}/${sdk_dir}"
          # asset triple (== TK_TRIPLE == target/<dir>) : cargo-zigbuild --target
          build() {
            local triple="$1" zig_target="$2" bin="tk" asset="tk-$1"
            case "$triple" in
              *-windows-*) bin="tk.exe"; asset="tk-${triple}.exe" ;;
            esac
            echo "::group::build ${triple} (${zig_target})"
            TK_TRIPLE="${triple}" cargo zigbuild --release -p tk --target "${zig_target}"
            cp "target/${triple}/release/${bin}" "dist/${asset}"
            echo "::endgroup::"
          }
          build x86_64-unknown-linux-musl  x86_64-unknown-linux-musl
          build x86_64-unknown-linux-gnu   x86_64-unknown-linux-gnu.2.28
          build aarch64-unknown-linux-musl aarch64-unknown-linux-musl
          build aarch64-apple-darwin       aarch64-apple-darwin
          build x86_64-pc-windows-gnu      x86_64-pc-windows-gnu
          # Per ADR-0029/ADR-0013 the install scripts ship as release assets so
          # the install command resolves them from the immutable latest release
          # rather than a mutable `main` path. They ride the same artifact.
          cp scripts/install.sh scripts/install.ps1 dist/
          ls -l dist

      - uses: actions/upload-artifact@v7
        with:
          name: tk-release-binaries
          path: dist/
          if-no-files-found: error
          retention-days: 14

  smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
          - triple: aarch64-apple-darwin
            runner: macos-14
          - triple: x86_64-pc-windows-gnu
            runner: windows-latest
            ext: .exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: tk-release-binaries
          path: dist
      - name: Smoke ${{ matrix.triple }}
        shell: bash
        run: ./scripts/smoke.sh ./dist/tk-${{ matrix.triple }}${{ matrix.ext }}
      # Publish gates per-triple asset upload on smoke success. Each smoke job
      # writes a marker file and uploads it as a per-triple artifact; the publish
      # job downloads all markers and attaches only the triples that produced
      # one. `if: success()` makes the gate explicit so a future `if: always()`
      # step added between smoke and marker cannot accidentally publish a binary
      # that failed smoke.
      - name: Record smoke pass for ${{ matrix.triple }}
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p smoke-markers
          : > "smoke-markers/${{ matrix.triple }}"
      - if: success()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-pass-${{ matrix.triple }}
          path: smoke-markers/${{ matrix.triple }}
          if-no-files-found: error
          retention-days: 14

  draft:
    needs: smoke
    # Assemble the draft Release only on a tag push. workflow_dispatch still
    # exercises build and smoke for manual verification but never touches a
    # Release. Per ADR-0029 a human publishes the draft; this job never does.
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: tk-release-binaries
          path: dist
      # Collect every smoke-pass-<triple> marker. merge-multiple flattens all
      # matching artifacts into one directory so the loop can learn which triples
      # passed smoke. A missing marker means that triple's smoke failed and its
      # binary is excluded from this release.
      - uses: actions/download-artifact@v8
        with:
          pattern: smoke-pass-*
          path: smoke-markers
          merge-multiple: true
      - name: Stage smoke-passing assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-flat
          shopt -s nullglob
          for marker in smoke-markers/*; do
            triple="$(basename "${marker}")"
            case "${triple}" in
              *-windows-*) asset="tk-${triple}.exe" ;;
              *)           asset="tk-${triple}" ;;
            esac
            mv "dist/${asset}" "release-flat/${asset}"
            echo "draft: staged ${asset}"
          done
          # needs:smoke short-circuits this job when any required triple fails,
          # so this guard is for the residual case where a future refactor lets
          # it run with no markers. Without it the draft would carry no binaries.
          if [ -z "$(ls -A release-flat)" ]; then
            echo "draft: no smoke-passing binaries; refusing to assemble release" >&2
            exit 1
          fi
          # Install scripts ship on every release (ADR-0029/ADR-0013) regardless
          # of the smoke matrix — they are not platform binaries.
          mv dist/install.sh dist/install.ps1 release-flat/
      - name: Assemble draft Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # This job has no actions/checkout (it only downloads artifacts), so
          # gh has no git remote to infer the target repo from. Name it
          # explicitly or `gh release` aborts with "not a git repository".
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Idempotent re-run handling. `gh release create` fails if a Release
          # for the tag already exists, so a retry must clear a prior *draft*
          # first. A prior *published* Release is immutable (ADR-0029) — refuse
          # to touch it rather than attempt a clobber that cannot succeed.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            if [ "$(gh release view "${TAG}" --json isDraft -q .isDraft)" = "true" ]; then
              echo "draft: clearing existing draft for ${TAG} before re-assembling"
              gh release delete "${TAG}" --yes  # leaves the git tag in place
            else
              echo "draft: ${TAG} is already published and immutable; refusing to recreate" >&2
              exit 1
            fi
          fi
          # --target pins the Release to the exact tagged commit so the tag the
          # human eventually publishes points where the binaries were built,
          # independent of any commits that land on main in the meantime.
          gh release create "${TAG}" \
            --draft \
            --target "${GITHUB_SHA}" \
            --title "${TAG}" \
            --notes-file dist/release-notes.md \
            release-flat/*
